 {% extends 'base.html' %}
   {% block content %}
  <!-- LEFT SIDE: INTERFACE 1 (Mes commandes) + INTERFACE 2 (Passer commande) + INTERFACE 3 (Confirmation) 
       but we combine to replicate full flow but visually show all screens as per design -->
<div class="container-fluid p-0 d-flex flex-column gap-3 main" style="padding-bottom: 80px !important;">
    
    <div class="container-fluid d-flex">
        <p class="text-muted ms-auto user"> <strong>Partenaire: {{ session['maquis_nom'] }}</strong></p>
    </div>
    <div class="container-fluid p-0 banner">
        <h1>DU BON POULET BRAISÉ POUR VOUS</h1>
        <!-- <a href="./form-commande.html" class="btn btn-custom-primary rounded-pill">
            Commandez <i class="bi bi-arrow-right-circle-fill ms-3"></i>
        </a> -->
        <img src="{{ url_for('static', filename='back/back0.png') }}" alt="">
    </div>

    <div class="container-fluid p-0 d-flex gap-2">
        <div class="col commission-items">
            <h3>0</h3>
            <p class="small text-white">Commandes</p>
        </div>
        <div class="col commission-items">
            <h3>0 F</h3>
            <p class="small text-white">Commission du</p>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center my-3 subtitle">
        <h4 class="fw-bold">Mes Commissions</h4>
        <span class="text-muted">Toutes mes commission</span>
    </div>

    <div class="container-fluid p-0 d-flex flex-column gap-2 list-commande">
   
    </div>
</div>
<!-- <footer>Du Bon Poulet Braisé — Commandez et gagnez des commissions avec votre code promo</footer> -->
<script>
    let intervalId = null; // Variable pour stocker l'ID de l'intervalle

    function loadCommissions() {
        fetch('/api/commissions')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                // Mettre à jour les compteurs
                const uniqueCommandsElement = document.querySelector('.commission-items h3');
                const totalComElement = document.querySelector('.commission-items:nth-child(2) h3');
                
                if (uniqueCommandsElement) {
                    uniqueCommandsElement.textContent = data.total_commande;
                }
                
                if (totalComElement) {
                    totalComElement.textContent = data.total_commission + ' F';
                }
                
                // Mettre à jour la liste des commissions
                const listContainer = document.querySelector('.list-commande');
                if (listContainer) {
                    const oldHeight = listContainer.scrollHeight;
                    listContainer.innerHTML = '';
                    
                    if (data.commandes && data.commandes.length > 0) {
                        data.commandes.forEach(commission => {
                            const item = document.createElement('div');
                            item.className = 'order-item shadow-sm';
                            item.innerHTML = `
                                <div class="content w-100 d-flex gap-3">
                                    <div class="image">
                                        <img src="{{ url_for('static', filename='back/back0.png') }}" alt="">
                                    </div>
                                    <div class="text d-flex flex-column">
                                        <h3>${escapeHtml(commission.produit)} <span class="dot dot-success"><i class="bi bi-check-circle-fill"></i></span></h3>
                                        <div class="small text-muted desc">Commission pour ce produit</div>
                                        <div class="price-tag">${commission.commission} F</div>
                                    </div>
                                    <div class="d-flex flex-column justify-content-between ms-auto mt-2 infos">
                                        <p class="small text-muted date">${commission.date ? new Date(commission.date).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' }) : 'N/A'}</p>
                                        <p class="quantity ms-auto">${commission.quantite}</p>
                                    </div>
                                </div>
                            `;
                            listContainer.appendChild(item);
                        });
                        
                        // Animation si nouvelle donnée
                        // const newHeight = listContainer.scrollHeight;
                        // if (oldHeight !== newHeight) {
                        //     listContainer.style.opacity = '0';
                        //     setTimeout(() => {
                        //         listContainer.style.transition = 'opacity 0.3s';
                        //         listContainer.style.opacity = '1';
                        //     }, 100);
                        // }
                    } else {
                        listContainer.innerHTML = '<div class="text-center p-4">Aucune commission pour le moment</div>';
                    }
                }
                
            })
            .catch(error => {
                console.error('Log JS: Erreur lors du chargement des données:', error);
                // Afficher une erreur à l'utilisateur
                const listContainer = document.querySelector('.list-commande');
                if (listContainer && listContainer.innerHTML === '') {
                    listContainer.innerHTML = '<div class="text-center p-4 text-danger">Erreur de chargement des données</div>';
                }
            });
    }

    // Fonction utilitaire pour éviter les attaques XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // Démarrer l'actualisation automatique
    function startAutoRefresh(intervalSeconds = 10) {
        // Arrêter l'ancien intervalle s'il existe
        if (intervalId) {
            clearInterval(intervalId);
        }
        
        // Charger immédiatement au démarrage
        loadCommissions();
        
        // Puis actualiser périodiquement
        intervalId = setInterval(loadCommissions, intervalSeconds * 1000);
    }

    // Arrêter l'actualisation automatique
    function stopAutoRefresh() {
        if (intervalId) {
            clearInterval(intervalId);
            intervalId = null;
        }
    }

    // Démarrer au chargement de la page
    document.addEventListener('DOMContentLoaded', function() {
        // Démarrer l'actualisation toutes les 20 secondes (ajustez selon vos besoins)
        startAutoRefresh(5);
    });

    // Optionnel : Arrêter l'actualisation quand l'utilisateur quitte la page
    window.addEventListener('beforeunload', function() {
        stopAutoRefresh();
    });
</script>
{% endblock %}
