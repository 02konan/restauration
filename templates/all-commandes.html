        /* Context menu dropdown */
        .context-menu {
            position: fixed;
            z-index: 9999;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            min-width: 180px;
            overflow: hidden;
            animation: contextFadeIn 0.15s ease;
        }
        @keyframes contextFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .context-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 18px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            color: #1C1C1C;
            transition: 0.15s;
        }
        .context-menu-item:hover { background: #FFF5E1; }
        .context-menu-item.danger { color: #C0392B; }
        .context-menu-item + .context-menu-item {
            border-top: 1px solid #f0f0f0;
        }

    <script>
        // Variables globales
        let currentPage = 1;
        let currentFilters = new FormData();
        let resultsPerPage = 10;
        let searchTimeout;
        let activeFilter = '';

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {

            // Écouteurs filtre statut (pills)
            document.querySelectorAll('.filter-pill').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    activeFilter = this.dataset.filter;
                    currentPage = 1;
                });
            });

            // Fermer le menu contextuel en cliquant ailleurs
            document.addEventListener('click', closeContextMenu);
            document.addEventListener('scroll', closeContextMenu, true);

            // Ajouter les écouteurs context menu aux order-items existants
            document.querySelectorAll('.order-item').forEach((row, index) => {
                // Simuler un ID de commande pour la démo (dans un vrai app, ça viendrait des données)
                const commandeId = index + 1;
                const commandeStatut = index === 0 ? 'en_attente' : index === 1 ? 'en_preparation' : 'livree';
                
                // Context menu : clic droit desktop + maintien mobile
                let pressTimer;
                row.addEventListener('contextmenu', (e) => showContextMenu(e, commandeId, commandeStatut));
                row.addEventListener('touchstart', (e) => {
                    pressTimer = setTimeout(() => {
                        const touch = e.touches[0];
                        showContextMenu({ preventDefault: () => {}, clientX: touch.clientX, clientY: touch.clientY }, commandeId, commandeStatut);
                    }, 600);
                }, { passive: true });
                row.addEventListener('touchend', () => clearTimeout(pressTimer));
                row.addEventListener('touchmove', () => clearTimeout(pressTimer));
            });
        });

        // ── Context menu ──────────────────────────────────────
        let contextMenuTarget = null;

        function showContextMenu(e, commandeId, commandeStatut) {
            e.preventDefault();
            closeContextMenu();

            contextMenuTarget = { id: commandeId, statut: commandeStatut };

            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.id = 'contextMenu';

            menu.innerHTML = `
                <button class="context-menu-item" onclick="handleContextAction('details', ${commandeId})">
                    <i class="bi bi-eye"></i> Détails
                </button>
                <button class="context-menu-item" onclick="handleContextAction('traiter', ${commandeId})">
                    <i class="bi bi-arrow-repeat"></i> Traiter
                </button>
                <button class="context-menu-item danger" onclick="handleContextAction('livree', ${commandeId})">
                    <i class="bi bi-check-circle-fill"></i> Livrée
                </button>
            `;

            // Positionner le menu
            const x = e.clientX || (e.touches && e.touches[0].clientX) || window.innerWidth / 2;
            const y = e.clientY || (e.touches && e.touches[0].clientY) || window.innerHeight / 2;

            menu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
            menu.style.top  = Math.min(y, window.innerHeight - 160) + 'px';

            document.body.appendChild(menu);
        }

        function closeContextMenu() {
            const existing = document.getElementById('contextMenu');
            if (existing) existing.remove();
            contextMenuTarget = null;
        }
