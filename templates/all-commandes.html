 {% extends 'base.html' %}
   {% block content %}
    <style>
        .order-item {
            transition: transform 0.2s;
        }
        .order-item:hover {
            transform: translateY(-2px);
        }
        .dot {
            font-size: 1.2rem;
        }
        .border-top {
            border-color: #e9ecef !important;
        }
        #searchForm{
            background: var(--white);
        }
        #searchForm input{
            background: transparent;
            border: none;
            outline: none;
        }

        /* Filter pills */
        .filter-pills {
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .filter-pills::-webkit-scrollbar { display: none; }
        .filter-pill {
            white-space: nowrap;
            border: 1.5px solid #C0392B;
            color: var(--text-color);
            background: var(--white);
            font-size: 12px;
            padding: 4px 14px;
            transition: all 0.2s;
        }
        .filter-pill.active,
        .filter-pill:hover {
            background: #C0392B;
            color: #fff;
        }

        /* Context menu dropdown */
        .context-menu {
            position: fixed;
            z-index: 9999;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            min-width: 180px;
            overflow: hidden;
            animation: contextFadeIn 0.15s ease;
        }
        @keyframes contextFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .context-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 18px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            color: #1C1C1C;
            transition: 0.15s;
        }
        .context-menu-item:hover { background: #FFF5E1; }
        .context-menu-item.danger { color: #C0392B; }
        .context-menu-item + .context-menu-item {
            border-top: 1px solid #f0f0f0;
        }
    </style>

  <!-- LEFT SIDE: INTERFACE 1 (Mes commandes) + INTERFACE 2 (Passer commande) + INTERFACE 3 (Confirmation) 
    but we combine to replicate full flow but visually show all screens as per design -->
    <div class="container-fluid p-0 d-flex flex-column gap-3 main">
        <div class="container-fluid d-flex align-items-center">
            <div class="">
                <h5 class="m-0 p-0">{{session['username']}}</h5>
                <span class="small text-muted">{{session['role']}}</span>
            </div>
            <a href="/logout" class="ms-auto">Se deconnecter<i class="bi bi-box-arrow-right ms-2"></i></a>
        </div>

        <div class="container-fluid p-0 banner">
            <h1>DU BON POULET BRAISÉ POUR VOUS</h1>
            <a href="/form-commande" class="btn btn-custom-primary rounded-pill">
                Nouvelle commande <i class="bi bi-arrow-right-circle-fill ms-3"></i>
            </a>
            <img src="{{ url_for('static', filename='back/back0.png') }}" alt="Poulet braisé">
        </div>

        <div class="d-flex justify-content-between align-items-center my-3 subtitle">
            <h4 class="fw-bold">Mes commandes</h4>
            <span class="text-muted" id="totalResults">
            </span>
        </div>

        <div class="w-100 d-flex gap-2">
            <form action="" class="d-flex col-10 align-items-center px-3 py-3 rounded-pill animation-slide" id="searchForm">
                <i class="bi bi-search me-2"></i>
                <input type="text" class="" placeholder="Recherche..." id="searchInput" name="searchInput">
            </form>
            <div class="d-flex col-2 align-items-center px-3 py-3 rounded-pill animation-slide" style="background: #fff;">
                <input type="date" class="border-0  date-input" placeholder="Recherche..." id="searchInput" name="searchInput">
            </div>
        </div>

        <div class="d-flex gap-2 mt-2 filter-pills animation-slide" id="filterPills">
            <button type="button" class="btn btn-sm rounded-pill filter-pill active" data-filter="">Tous</button>
            <button type="button" class="btn btn-sm rounded-pill filter-pill" data-filter="en_preparation">Traiter</button>
            <button type="button" class="btn btn-sm rounded-pill filter-pill" data-filter="livree">Livrée</button>
        </div>
        <div class="container-fluid p-0 d-flex flex-column gap-2 list-commande animation-slide" id="result-commande">
            
        </div>
        <audio id="notificationSound" src="{{ url_for('static', filename='js/bip.wav') }}" preload="auto"></audio>
    </div>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/js/sw.js')
        .then(() => console.log("Service Worker enregistré"))
        .catch(err => console.log("Erreur SW", err));
    }
    </script>
    <script>
        // Variables globales
        let currentPage = 1;
        let currentFilters = new FormData();
        let resultsPerPage = 10;
        let searchTimeout;
        let activeFilter = '';

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {

            // Écouteurs filtre statut (pills)
            document.querySelectorAll('.filter-pill').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    activeFilter = this.dataset.filter;
                    currentPage = 1;
                });
            });

            // Fermer le menu contextuel en cliquant ailleurs
            document.addEventListener('click', closeContextMenu);
            document.addEventListener('scroll', closeContextMenu, true);

            // Ajouter les écouteurs context menu aux order-items existants
            document.querySelectorAll('.order-item').forEach((row, index) => {
                // Simuler un ID de commande pour la démo (dans un vrai app, ça viendrait des données)
                const commandeId = index + 1;
                const commandeStatut = index === 0 ? 'en_attente' : index === 1 ? 'en_preparation' : 'livree';
                
                // Context menu : clic droit desktop + maintien mobile
                let pressTimer;
                row.addEventListener('contextmenu', (e) => showContextMenu(e, commandeId, commandeStatut));
                row.addEventListener('touchstart', (e) => {
                    pressTimer = setTimeout(() => {
                        const touch = e.touches[0];
                        showContextMenu({ preventDefault: () => {}, clientX: touch.clientX, clientY: touch.clientY }, commandeId, commandeStatut);
                    }, 600);
                }, { passive: true });
                row.addEventListener('touchend', () => clearTimeout(pressTimer));
                row.addEventListener('touchmove', () => clearTimeout(pressTimer));
            });
        });

        // ── Context menu ──────────────────────────────────────
        let contextMenuTarget = null;

        function showContextMenu(e, commandeId, commandeStatut) {
            e.preventDefault();
            closeContextMenu();

            contextMenuTarget = { id: commandeId, statut: commandeStatut };

            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.id = 'contextMenu';

            menu.innerHTML = `
                <button class="context-menu-item" onclick="handleContextAction('details', ${commandeId})">
                    <i class="bi bi-eye"></i> Détails
                </button>
                <button class="context-menu-item" onclick="handleContextAction('traiter', ${commandeId})">
                    <i class="bi bi-arrow-repeat"></i> Traiter
                </button>
                <button class="context-menu-item danger" onclick="handleContextAction('livree', ${commandeId})">
                    <i class="bi bi-check-circle-fill"></i> Livrée
                </button>
            `;

            // Positionner le menu
            const x = e.clientX || (e.touches && e.touches[0].clientX) || window.innerWidth / 2;
            const y = e.clientY || (e.touches && e.touches[0].clientY) || window.innerHeight / 2;

            menu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
            menu.style.top  = Math.min(y, window.innerHeight - 160) + 'px';

            document.body.appendChild(menu);
        }

        function closeContextMenu() {
            const existing = document.getElementById('contextMenu');
            if (existing) existing.remove();
            contextMenuTarget = null;
        }
