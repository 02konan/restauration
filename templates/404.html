<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#C0392B">
    <title>404 — Page introuvable</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --red:    #C0392B;
            --red2:   #e74c3c;
            --cream:  #FFF5E1;
            --dark:   #1C1C1C;
            --orange: #FF6B00;
            --muted:  #9e8e7e;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Fond décoratif ── */
        .bg-circles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .bg-circles span {
            position: absolute;
            border-radius: 50%;
            opacity: .07;
            background: var(--red);
            animation: float linear infinite;
        }
        .bg-circles span:nth-child(1)  { width: 500px; height: 500px; top: -150px; left: -150px; animation-duration: 20s; }
        .bg-circles span:nth-child(2)  { width: 300px; height: 300px; bottom: -80px; right: -80px; animation-duration: 15s; animation-delay: -5s; }
        .bg-circles span:nth-child(3)  { width: 180px; height: 180px; top: 40%; left: 10%; animation-duration: 25s; animation-delay: -10s; }

        @keyframes float {
            0%   { transform: translate(0, 0) rotate(0deg); }
            33%  { transform: translate(20px, -15px) rotate(120deg); }
            66%  { transform: translate(-10px, 20px) rotate(240deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* ── Grille de points ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(192,57,43,.12) 1px, transparent 1px);
            background-size: 28px 28px;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Contenu ── */
        .page {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 32px 24px;
            max-width: 480px;
            width: 100%;
        }

        /* ── Émoji poulet ── */
        .emoji-wrap {
            position: relative;
            margin-bottom: 8px;
        }
        .emoji {
            font-size: 90px;
            display: block;
            animation: wiggle 2.5s ease-in-out infinite;
            filter: drop-shadow(0 8px 24px rgba(192,57,43,.25));
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(-6deg) scale(1); }
            25%       { transform: rotate(6deg) scale(1.05); }
            50%       { transform: rotate(-4deg) scale(1); }
            75%       { transform: rotate(4deg) scale(1.03); }
        }

        /* Flammes animées */
        .flames {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: -8px;
            margin-bottom: 4px;
        }
        .flame {
            font-size: 22px;
            animation: flicker 1s ease-in-out infinite alternate;
        }
        .flame:nth-child(2) { animation-delay: .2s; font-size: 28px; }
        .flame:nth-child(3) { animation-delay: .4s; }
        @keyframes flicker {
            from { transform: scaleY(1)   translateY(0); opacity: .9; }
            to   { transform: scaleY(1.2) translateY(-4px); opacity: 1; }
        }

        /* ── 404 ── */
        .num-404 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(100px, 28vw, 160px);
            font-weight: 800;
            line-height: .9;
            color: transparent;
            -webkit-text-stroke: 3px var(--red);
            position: relative;
            letter-spacing: -4px;
            animation: fadeUp .6s ease both;
        }
        .num-404::after {
            content: '404';
            position: absolute;
            inset: 4px 0 0 4px;
            color: transparent;
            -webkit-text-stroke: 3px rgba(255,107,0,.25);
            z-index: -1;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Badge ── */
        .badge-oops {
            display: inline-block;
            background: var(--red);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 100px;
            margin-bottom: 18px;
            animation: fadeUp .6s .15s ease both;
        }

        /* ── Titre & texte ── */
        .title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(22px, 6vw, 28px);
            font-weight: 800;
            margin-bottom: 10px;
            animation: fadeUp .6s .25s ease both;
        }
        .subtitle {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.7;
            max-width: 320px;
            margin: 0 auto 32px;
            animation: fadeUp .6s .35s ease both;
        }

        /* ── Boutons ── */
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp .6s .45s ease both;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 26px;
            border-radius: 100px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: transform .2s, box-shadow .2s;
        }
        .btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.15); }
        .btn:active { transform: translateY(0); }

        .btn-primary {
            background: var(--red);
            color: #fff;
            box-shadow: 0 4px 16px rgba(192,57,43,.35);
        }
        .btn-outline {
            background: transparent;
            color: var(--dark);
            border: 2px solid rgba(28,28,28,.2);
        }
        .btn-outline:hover { border-color: var(--red); color: var(--red); }

        /* ── Séparateur ── */
        .divider {
            width: 48px;
            height: 3px;
            background: linear-gradient(90deg, var(--red), var(--orange));
            border-radius: 10px;
            margin: 28px auto 0;
            animation: fadeUp .6s .55s ease both;
        }

        /* ── Bas de page ── */
        .footer-note {
            margin-top: 16px;
            font-size: 12px;
            color: var(--muted);
            animation: fadeUp .6s .6s ease both;
        }
        .footer-note span { color: var(--red); font-weight: 700; }
    </style>
</head>
<body>

    <!-- Cercles décoratifs -->
    <div class="bg-circles">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="page">

        <!-- Poulet animé -->
        <div class="emoji-wrap">
            <span class="emoji">🍗</span>
        </div>
        <div class="flames">
            <span class="flame">🔥</span>
            <span class="flame">🔥</span>
            <span class="flame">🔥</span>
        </div>

        <!-- 404 -->
        <div class="num-404">404</div>

        <!-- Badge -->
        <span class="badge-oops">Page introuvable</span>

        <!-- Texte -->
        <h1 class="title">Ce poulet s'est échappé&nbsp;!</h1>
        <p class="subtitle">
            La page que vous cherchez n'existe pas ou a été déplacée.<br>
            Retournez à l'accueil pour passer votre commande.
        </p>

        <!-- Actions -->
        <div class="actions">
            <a href="./commande.php" class="btn btn-primary">
                🏠 Retour à l'accueil
            </a>
            <a href="javascript:history.back()" class="btn btn-outline">
                ← Page précédente
            </a>
        </div>

        <div class="divider"></div>
        <p class="footer-note">Du bon poulet braisé &mdash; <span>toujours là pour vous</span></p>

    </div>

</body>
</html>
