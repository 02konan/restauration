 {% extends 'base.html' %}
   {% block content %}
  
  
    <style>
    body{
        padding: 0 !important;
        height: 100vh;
        overflow: hidden;
    }
    .main{
        padding: 0 !important;
        padding-bottom: 0 !important;
    }
    #map{
        width: 100%;
        height: 100vh;
    }
    .cart-start{
        position: fixed;
        display: flex;
        flex-direction: column;
        background: var(--white);
        z-index: 1000;
        left: 10px;
        right: 10px;
        bottom: 10px;
        align-items: center;
        padding: 10px;
        gap: 5px;
    }
    .list-btn{
        position: fixed;
        display: flex;
        width: 50px;
        height: 50px;
        top: 10px;
        right: 10px;
        justify-content: center;
        align-items: center;
        padding: 10px;
        gap: 5px;
        z-index: 1000;
        outline: none;
        border: 0;
        background: var(--white);
    }
    .cart-start .btn{
        width: 100%;
    }
    .quantity{
        width: 30px;
        height: 30px;
        font-size: 14px !important;
        font-weight: 700;
    }
    .cart-livreur{
        position: fixed;
        height: 100vh;
        background: var(--cream);
        z-index: 1003;
        top: 0;
        left: 0;
        right: 0;
        padding: 10px;
        gap: 10px;
        border-radius: 0 !important;
        overflow: hidden;
        overflow-y: auto;
        transition: all 0.5s ease-in-out;
    }
    .cart-livreur.hidden{
        position: fixed;
        height: 100vh;
        background: var(--cream);
        z-index: 1003;
        top: -150%;
        left: 0;
        right: 0;
        padding: 10px;
        gap: 10px;
        border-radius: 0 !important;
        overflow: hidden;
        overflow-y: auto;
    }
   </style>

   <div id="map"></div>
<button class="list-btn rounded" id="list-btn"><i class="bi bi-list"></i></button>

<div class="cart-start shadow rounded" id="cart-start">
    <div class="w-100 d-flex justify-content-between border-bottom">
        <div>
            <h6>CMD-123456546-123454</h6>
            <p class="small text-muted">07 89 14 79 58</p>
        </div>
        <span class="fw-semibold">10 000 FCFA</span>
    </div>
    <div class="d-flex justify-content-between w-100 mb-3">
        <div class="col-10">
            <div class="">
                <span class="small text-muted">Lieu</span>
                <h6 class="m-0">ABOBO SAINT VIATOR</h6>
            </div>
        </div>
        <div class="mt-auto">
            <p class="quantity m-0 ms-auto mb-0">2</p>
        </div>
    </div>
    <a href="#" class="btn btn-custom-primary rounded-pill" id="gpsLink" target="_blank">
        Démarrer la livraison
    </a>
</div>

<div class="cart-livreur shadow" id="cart-livreur">
    <div class="container-fluid d-flex align-items-center mb-5">
        <div class="">
            <h5 class="m-0 p-0">Marius</h5>
            <span class="small text-muted">livreur</span>
        </div>
        <a href="/logout" class="ms-auto">Se deconnecter<i class="bi bi-box-arrow-right ms-2"></i></a>
    </div>
    <div class="container-fluid p-0 banner">
        <h1>DU BON POULET BRAISÉ POUR VOUS</h1>
        <img src="{{ url_for('static', filename='back/back0.png') }}" alt="Poulet braisé">
    </div>

    <div class="d-flex justify-content-between align-items-center my-3 subtitle">
        <h4 class="fw-bold">Livraison</h4>
        <span class="text-muted" id="totalResults"></span>
    </div>
    <div>

        <div class="w-100 d-flex gap-2 mb-3">
            <form action="" class="d-flex col align-items-center px-3 py-3 rounded-pill animation-slide" id="searchForm">
                <i class="bi bi-search me-2"></i>
                <input type="text" class="" placeholder="Recherche..." id="searchInput" name="searchInput">
            </form>
        </div>

        <div class="d-flex flex-column gap-2" id="command-livreur">
            <!-- Les commandes seront générées dynamiquement par livreur.js -->
        </div>
    </div>
</div>

<div class="container-fluid p-0 d-flex flex-column gap-3 main" style="padding-bottom: 80px !important;">
    <div class="container-fluid d-flex">
        <a href="#" class="ms-auto">Se connecter</a>
    </div>

    <div class="container-fluid p-0 banner">
        <h1>DU BON POULET BRAISÉ POUR VOUS</h1>
        <img src="{{ url_for('static', filename='back/back0.png') }}" alt="Poulet braisé">
    </div>

    <div class="d-flex justify-content-between align-items-center my-3 subtitle">
        <h4 class="fw-bold">Livraisons</h4>
        <span class="text-muted"></span>
    </div>

    <div class="d-flex gap-2 mt-2 filter-pills animation-slide" id="filterPills">
        <button type="button" class="btn btn-sm rounded-pill filter-pill active" data-filter="">Tous</button>
        <button type="button" class="btn btn-sm rounded-pill filter-pill" data-filter="en_preparation">Mes Livraisons</button>
    </div>

    <audio id="notificationSound" src="{{ url_for('static', filename='js/bip.wav') }}" preload="auto"></audio>
</div>
    
{% endblock %}
