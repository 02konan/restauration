 {% extends 'base.html' %}
   {% block content %}
<div class="container-fluid p-0 d-flex flex-column gap-3 main" style="padding-bottom: 80px !important;">
    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow position-fixed">
        <div class="container-fluid d-flex justify-content-center ">
            <div class="w-100" id="">
                <ul class="navbar-nav mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./form-record.html"><i class="bi bi-file-earmark-text bi-simple"></i> <i class="bi bi-file-earmark-text-fill bi-active"></i> <span class="ms-1">Formulaire</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./partner.html"><i class="bi bi-building bi-simple"></i> <i class="bi bi-building-fill bi-active"></i> <span class="ms-1">Etablissement</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./profile.html"><i class="bi bi-person bi-simple"></i> <i class="bi bi-person-fill bi-active"></i> <span class="ms-1">Profil</span></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="d-flex align-items-center gap-2 my-3 mb-1">
        <h4 class="fw-bold">Partenaire</h4>
    </div>

    <div class="container-fluid p-0 banner">
        <h1>Devenez partenaire et gagner gros</h1>
        <!-- <a href="./form-commande.html" class="btn btn-custom-primary rounded-pill">
            Commandez <i class="bi bi-arrow-right-circle-fill ms-3"></i>
        </a> -->
        <img class="back1" src="./assets/back/back1.png" alt="">
    </div>

    <form class="container-fluid p-0 d-flex flex-column gap-2 list-commande" id="partnerForm">
        <div class="card-commande-item shadow-sm">
            <h6 class="">Propriétaire</h6>
            <hr>
            <div class="mt-3">
                <label for="" class="form-label">Nom complet <span class="required">*</span></label>
                <input type="text" class="form-control" placeholder="" id="fullName" required>
            </div>
            <div class="d-flex gap-2 mt-2">
                <div class="col">
                    <label for="" class="form-label">Contact<span class="required">*</span></label>
                    <input type="text" class="form-control" placeholder="" id="contact" required>
                </div>
                <div class="col">
                    <label for="" class="form-label">CNI <span class="required">*</span></label>
                    <input type="text" class="form-control" placeholder="" id="cni">
                </div>
            </div>
        </div>
        <div class="card-commande-item shadow-sm">
            <h6 class="">Etablissement</h6>
            <hr>
            <div class="mt-3">
                <label for="" class="form-label">Nom de l'établissement <span class="required">*</span></label>
                <input type="text" class="form-control" placeholder="" id="establishment" required>
            </div>
            <div class="d-flex gap-2 mt-2">
                <div class="col">
                    <label for="" class="form-label">Téléphone <span class="required">*</span></label>
                    <input type="text" class="form-control" placeholder="" id="phone" required>
                </div>
                <div class="col">
                    <label for="" class="form-label">Commune <span class="required">*</span></label>
                    <input type="text" class="form-control" placeholder="" id="commune">
                </div>
            </div>
            <div class="mt-2">
                <label for="" class="form-label">Quartier <span class="required">*</span></label>
                <input type="text" class="form-control" placeholder="" id="quartier">
            </div>
        </div>
        <div class="card-commande-item shadow-sm">
            <div class="w-100 d-flex align-items-center">
                <h6 class="">Localisation</h6>
                <button type="button" class="btn-locate ms-auto" id="locateBtn">
                    <i class="bi bi-geo-alt-fill"></i>
                </button>
            </div>
            <hr>
            <div class="d-flex gap-2 mt-2">
                <div class="col">
                    <label for="" class="form-label">Longitude <span class="required">*</span></label>
                    <input type="text" class="form-control" id="longitude" placeholder="" readonly required>
                </div>
                <div class="col">
                    <label for="" class="form-label">Latitude <span class="required">*</span></label>
                    <input type="text" class="form-control" id="latitude" placeholder="" readonly required>
                </div>
            </div>
        </div>
        <div class="card-commande-item shadow-sm">
            <h6 class="">Accés</h6>
            <hr>
            <div class="mt-2">
                <label for="" class="form-label">Email <span class="required">*</span></label>
                <input type="email" class="form-control" placeholder="" id="email" required>
            </div>
            <div class="mt-2">
                <label for="" class="form-label">Mot de passe <span class="required">*</span></label>
                <input type="password" class="form-control" placeholder="" id="password" required>
            </div>
        </div>
        <button type="submit" class="btn btn-custom-secondary rounded-pill mt-3 animation-slide">
            <i class="bi bi-check-circle-fill"></i><span class="ms-2">Enregistrer</span>
        </button>
    </form>
</div>


<script>
    // Récupération des éléments
    const locateBtn = document.getElementById('locateBtn');
    const longitudeInput = document.getElementById('longitude');
    const latitudeInput = document.getElementById('latitude');
    const partnerForm = document.getElementById('partnerForm');

    // Fonction pour obtenir la localisation
    function getLocation() {
        // Vérifier si le navigateur supporte la géolocalisation
        if (!navigator.geolocation) {
            Swal.fire({
                icon: 'error',
                title: 'Non supporté',
                text: 'Votre navigateur ne supporte pas la géolocalisation.',
                confirmButtonColor: '#dc3545'
            });
            return;
        }

        // Afficher un indicateur de chargement
        Swal.fire({
            title: 'Récupération de votre position...',
            text: 'Veuillez patienter quelques secondes',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        // Options de géolocalisation
        const options = {
            enableHighAccuracy: true,    // Haute précision
            timeout: 10000,              // Timeout 10 secondes
            maximumAge: 0               // Pas de cache
        };

        // Obtenir la position
        navigator.geolocation.getCurrentPosition(
            // Succès
            (position) => {
                const latitude = position.coords.latitude;
                const longitude = position.coords.longitude;
                
                // Remplir les champs
                longitudeInput.value = longitude.toFixed(6);
                latitudeInput.value = latitude.toFixed(6);
                
                Swal.fire({
                    icon: 'success',
                    title: 'Position obtenue !',
                    text: `Latitude: ${latitude.toFixed(6)}\nLongitude: ${longitude.toFixed(6)}`,
                    confirmButtonColor: '#FF6B00',
                    timer: 2000,
                    showConfirmButton: true,
                    backdrop: true,
                    didOpen: () => {
                        document.querySelector('.swal2-container').classList.add('blur-bg');
                    },
                    customClass: {
                        popup: 'my-swal-font'
                    }
                });
            },
            // Erreur
            (error) => {
                let errorMessage = '';
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        errorMessage = 'Vous avez refusé la demande de géolocalisation. Veuillez autoriser l\'accès à votre position.';
                        break;
                    case error.POSITION_UNAVAILABLE:
                        errorMessage = 'Les informations de position ne sont pas disponibles.';
                        break;
                    case error.TIMEOUT:
                        errorMessage = 'La demande de géolocalisation a expiré.';
                        break;
                    default:
                        errorMessage = 'Une erreur est survenue lors de la récupération de la position.';
                        break;
                }
                
                Swal.fire({
                    icon: 'error',
                    title: 'Erreur de localisation',
                    text: errorMessage,
                    confirmButtonColor: '#dc3545'
                });
            },
            options
        );
    }

    // Écouter le clic sur le bouton de localisation
    locateBtn.addEventListener('click', getLocation);

    // Gestion de la soumission du formulaire
    partnerForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        // Vérifier que les champs de localisation sont remplis
        if (!longitudeInput.value || !latitudeInput.value) {
            Swal.fire({
                icon: 'warning',
                title: 'Localisation manquante',
                text: 'Veuillez d\'abord obtenir votre position en cliquant sur le bouton "Obtenir ma position".',
                confirmButtonColor: '#dc3545'
            });
            return;
        }

        // Récupérer toutes les valeurs
        const formData = {
            fullName: document.getElementById('fullName').value,
            contact: document.getElementById('contact').value,
            cni: document.getElementById('cni').value,
            establishment: document.getElementById('establishment').value,
            phone: document.getElementById('phone').value,
            commune: document.getElementById('commune').value,
            quartier: document.getElementById('quartier').value,
            longitude: longitudeInput.value,
            latitude: latitudeInput.value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        // Validation des champs requis
        if (!formData.fullName || !formData.contact || !formData.establishment || 
            !formData.phone || !formData.email || !formData.password) {
            Swal.fire({
                icon: 'error',
                title: 'Champs manquants',
                text: 'Veuillez remplir tous les champs obligatoires (*)',
                confirmButtonColor: '#dc3545'
            });
            return;
        }

        // Afficher les données (simulation d'envoi)
        console.log('Données du formulaire:', formData);
        
        Swal.fire({
            icon: 'success',
            title: 'Enregistrement réussi !',
            text: 'Les informations du partenaire ont été enregistrées.',
            confirmButtonColor: '#dc3545'
        }).then(() => {
            // Optionnel: Réinitialiser le formulaire
            // partnerForm.reset();
        });
    });
</script>

</body>
</html>
