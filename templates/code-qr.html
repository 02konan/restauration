{% extends 'base.html' %}
   {% block content %}
    <!-- LEFT SIDE: INTERFACE 1 (Mes commandes) + INTERFACE 2 (Passer commande) + INTERFACE 3 (Confirmation) 
    but we combine to replicate full flow but visually show all screens as per design -->
    <div class="container-fluid p-0 d-flex flex-column gap-3 main" style="padding-bottom: 80px !important;">
        <nav class="navbar navbar-expand-lg bg-body-tertiary shadow position-fixed">
            <div class="container-fluid d-flex justify-content-center ">
                <!-- Logo/Brand à gauche -->
                <!-- <a class="navbar-brand" href="#">
                    <img class="me-5" src="./logo.png" height="35" alt="">
                </a> -->
                
                <!-- Menu collapse -->
                <div class="w-100" id="">
                    <!-- Liens de navigation -->
                    <ul class="navbar-nav mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="./commission.html"><i class="bi bi-wallet bi-simple"></i> <i class="bi bi-wallet-fill bi-active"></i> <span class="ms-1">Commissions</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="./code-qr.html"><i class="bi bi-qr-code"></i><span class="ms-1">Mon code Qr</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./profile.html"><i class="bi bi-person bi-simple"></i> <i class="bi bi-person-fill bi-active"></i> <span class="ms-1">Profil</span></a>
                        </li>
                    </ul>
                </div>
                <!-- <div class="btn-group">
                    <button class="btn btn-sm">S'inscrire</button>
                    <button class="btn btn-sm btn-dark rounded-pill">Se connecter</button>
                </div> -->
            </div>
        </nav>

        <div class="d-flex align-items-center gap-2 my-3">
            <a href="javascript:history.back()" class="return"><i class="bi bi-chevron-left"></i></a><h4 class="fw-bold">Code Qr</h4>
        </div>

        <form class="container-fluid p-0 d-flex flex-column gap-2 list-commande">
            <div class="card-code-qr d-flex justify-content-center align-items-center shadow-sm">
                <div class="qr-content" id="qrcode"></div>
            </div>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const maquisCode = '{{ maquis_code }}';
            
            if (!maquisCode || maquisCode === 'None') {
                document.getElementById('qrcode').innerHTML = '<p>Erreur: Code maquis non trouvé</p>';
                return;
            }
            
            const url = `https://lebonpouletbraise.com/form-commande?promo=${maquisCode}`;
            
            const qrElement = document.getElementById('qrcode');
            if (!qrElement) {
                return;
            }
            
            // Utiliser l'API gratuite de QR Server
            const img = document.createElement('img');
            img.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
            img.alt = "QR Code";
            img.style.width = "200px";
            img.style.height = "200px";
            img.style.maxWidth = "100%";
            
            // Vider le conteneur et ajouter l'image
            qrElement.innerHTML = '';
            qrElement.appendChild(img);
            
            
            // Gérer les erreurs de chargement
            img.onerror = function() {
                qrElement.innerHTML = '<p>Erreur: Impossible de générer le QR code. Vérifiez votre connexion internet.</p>';
            };
        });
    </script>
{% endblock %}
