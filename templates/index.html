{% extends 'base.html' %}
   {% block content %}
   <style>
    :root{
    --text-font: 'Montserrat', sans-serif;
    --title-font: 'Montserrat', sans-serif;
    --font-size: 13px !important;
    --text-color: #1C1C1C;
    --orange: #FF6B00;
    --dark-orange: #ff8833;
    --red: #C0392B;
    --dark-red: #e05040;
    --light-red: #fcebeb;
    --dark-white: #f7f7f7;
    --white: #FFFFFF;
    --cream: #fdfaf4;
    --grey: #80756b;
    --light-grey: #d1d3d8;
    --green: #27ae5f;
    --light-green: #27ae5f23;
}

body{
    height: 100vh;
    background: url(../static/back/back4.png) no-repeat;
    background-size: cover;
}
.text-content{
    height: 80vh;
}
.title{
    font-family: 'Montserrat', sans-serif;
    color: var(--cream);
    font-size: 40px;
    font-weight: 900;
}
.title .good{
    font-size: 80px;
}
/* .spinner-border{
    animation: smooths 0.5s ease;
    animation-delay: 1s;
} */

@keyframes smooths {
    0%{
        opacity: 0;
    }
    100%{
        opacity: 1;
    }
}
   </style>

    <div class="d-flex justify-content-center align-items-center flex-column container-fluid p-0 text-content">
        
        <div class="">
            <h1 class="title m-0" data-aos="fade-up" data-aos-delay="0"><span class="good">Le bon</span></h1>
            <h1 class="title" data-aos="fade-up" data-aos-delay="300">poulet braisé.</h1>
        </div>
        <div data-aos="fade-up" data-aos-delay="600">
            <!-- Le spinner tourne librement à l'intérieur -->
            <div class="spinner-border" style="color: #ff6600;width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            once: true
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/js/sw.js')
            .then(() => console.log("Service Worker enregistré"))
            .catch(err => console.log("Erreur SW", err));
        }

        setTimeout(function() {
            // Vérifier dans le localStorage s'il y a un numéro de téléphone
            const phoneNumber = localStorage.getItem('telephone');
            
            if (phoneNumber && phoneNumber.trim() !== '') {
                console.log("Numéro de téléphone trouvé:", phoneNumber);
                
                // Effectuer la requête fetch vers l'API de connexion
                // Remplacez l'URL par celle de votre API
                const apiUrl = '/api/login'; // À modifier avec votre URL API
                
                fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        telephone: phoneNumber
                        // Ajoutez d'autres paramètres si nécessaire
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log("Réponse de l'API:", data);
                    
                    // Traitez la réponse ici
                    if (data.success || data.status === 'success') {
                        // Redirection ou action réussie
                        // window.location.href = './accueil.html';
                    } else {
                        console.log("Échec de la connexion:", data.message);
                        // Gérer l'échec de connexion
                    }
                })
                .catch(error => {
                    console.error("Erreur lors de la requête fetch:", error);
                    // Gérer l'erreur (affichage d'un message, etc.)
                });
            } else {
                window.location.href = "/form-commande";
            }
        }, 2000); // 1000 millisecondes = 1 seconde
        
    </script>
    {% endblock %}
